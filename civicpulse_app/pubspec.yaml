name: civicpulse_app
description: Municipal issue reporting platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.1
  pretty_dio_logger: ^1.3.1

  # State management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Location / GPS
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  flutter_map_heatmap: ^0.0.7

  # Image / Camera
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/